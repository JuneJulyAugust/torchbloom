<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">TorchBloom AI title banner</title>
  <desc id="desc">A professional TorchBloom AI banner with a refined torch sprout mark and clean typography.</desc>
  <defs>
    <linearGradient id="flameWarm" x1="178" y1="82" x2="337" y2="281" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff0a6"/>
      <stop offset=".42" stop-color="#ffb23f"/>
      <stop offset="1" stop-color="#f9733d"/>
    </linearGradient>
    <linearGradient id="leafLeft" x1="140" y1="312" x2="258" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#48bb78"/>
      <stop offset="1" stop-color="#2f855a"/>
    </linearGradient>
    <linearGradient id="leafRight" x1="258" y1="382" x2="378" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2fb7a4"/>
      <stop offset="1" stop-color="#2c9a8b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1d2433" flood-opacity=".11"/>
    </filter>
  </defs>
  <rect width="1600" height="500" fill="#f7faf6"/>
  <path d="M0 414c215-54 401-51 560 9 210 79 397 77 610-6 169-66 301-68 430-20v103H0z" fill="#e7f3ee"/>
  <path d="M0 454c249-58 450-48 617 18 202 80 376 61 562-16 158-65 290-69 421-23v67H0z" fill="#d6eee6"/>
  <g transform="translate(118 76)" filter="url(#softShadow)">
    <rect width="324" height="324" rx="82" fill="#ffffff"/>
    <g transform="translate(48 35) scale(.45)">
      <path d="M118 393c61 42 215 42 276 0" fill="none" stroke="#1d2433" stroke-width="18" stroke-linecap="round"/>
      <path d="M256 403V249" fill="none" stroke="#1d2433" stroke-width="20" stroke-linecap="round"/>
      <path d="M257 270c-49-39-72-83-62-132 5-26 22-53 51-82 3 44 30 63 58 93 43 45 43 98-47 121z" fill="url(#flameWarm)"/>
      <path d="M248 270c-25-30-29-63-10-99 8 30 30 45 45 70 12 21 0 42-35 58z" fill="#ffe08a" opacity=".82"/>
      <path d="M258 322c-43-48-92-62-149-41 40 14 77 39 112 75 18-6 30-18 37-34z" fill="url(#leafLeft)"/>
      <path d="M258 322c43-48 93-62 150-41-40 14-77 39-112 75-18-6-30-18-38-34z" fill="url(#leafRight)"/>
      <path d="M202 363c33 17 75 17 108 0" fill="none" stroke="#1d2433" stroke-width="11" stroke-linecap="round" opacity=".18"/>
