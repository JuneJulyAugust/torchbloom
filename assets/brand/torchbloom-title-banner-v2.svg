  </g>
  <text x="520" y="177" fill="#1d2433" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="94" font-weight="850">TorchBloom AI</text>
  <text x="525" y="244" fill="#2f6657" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="720">Light the lamp. Grow the mind.</text>
  <text x="1092" y="244" fill="#2f6657" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="720">Build real AI.</text>
  <text x="526" y="300" fill="#394150" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="520">A mastery-based path from elementary math to machine learning,</text>
  <text x="526" y="334" fill="#394150" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="520">deep learning, and AI Olympiad readiness.</text>
  <g transform="translate(526 382)">
    <path d="M0 0h536" fill="none" stroke="#ffb23f" stroke-width="8" stroke-linecap="round"/>
    <circle cx="590" cy="0" r="13" fill="#2fb7a4"/>
    <circle cx="642" cy="0" r="13" fill="#48bb78"/>
    <circle cx="694" cy="0" r="13" fill="#f9733d"/>
